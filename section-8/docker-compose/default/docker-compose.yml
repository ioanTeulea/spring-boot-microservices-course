services:

  configserver:
    image: ioanteulea/configserver:s8
    container_name: configserver-ms
    ports:
      - "8071:8071"
    extends:
      service: microservice-base-config
      file: common-config.yml
    environment:
      SPRING_APPLICATION_NAME: "configserver"

  eurekaserver:
    image: ioanteulea/eurekaserver:s8
    container_name: eurekaserver-ms
    ports:
      - "8070:8070"
    depends_on:
      configserver:
        condition: service_started
    extends:
      service: microservice-configserver-config
      file: common-config.yml
    environment:
      SPRING_APPLICATION_NAME: "eurekaserver"

  accounts:
    image: ioanteulea/accounts:s8
    container_name: accounts-ms
    ports:
      - "8080:8080"
    depends_on:
      configserver:
        condition: service_started
      eurekaserver:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "accounts"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"
    extends:
      service: microservice-configserver-config
      file: common-config.yml


  loans1:
    image: ioanteulea/loans:s8
    container_name: loans1-ms
    ports:
      - "8091:8090"
    depends_on:
      configserver:
        condition: service_started
      eurekaserver:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "loans"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"
    extends:
      service: microservice-configserver-config
      file: common-config.yml

  loans:
    image: ioanteulea/loans:s8
    container_name: loans-ms
    ports:
      - "8090:8090"
    depends_on:
      configserver:
        condition: service_started
      eurekaserver:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "loans"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"
    extends:
      service: microservice-configserver-config
      file: common-config.yml

  cards:
    image: ioanteulea/cards:s8
    container_name: cards-ms
    ports:
      - "9000:9000"
    depends_on:
      configserver:
        condition: service_started
      eurekaserver:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "cards"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"

    extends:
      service: microservice-configserver-config
      file: common-config.yml

networks:
  bank-network:
    driver: bridge