services:

  rabbit:
    image: rabbitmq:3-management
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    extends:
      service: network-deploy-service
      file: common-config.yml

  configserver:
    image: ioanteulea/configserver:s6
    container_name: configserver-ms
    ports:
      - "8071:8071"
    depends_on:
      rabbit:
        condition: service_healthy
    extends:
      service: microservice-base-config
      file: common-config.yml

  accounts:
    image: ioanteulea/accounts:s6
    container_name: accounts-ms
    ports:
      - "8080:8080"
    depends_on:
      configserver:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "accounts"
    extends:
      service: microservice-configserver-config
      file: common-config.yml

  loans:
    image: ioanteulea/loans:s6
    container_name: loans-ms
    ports:
      - "8090:8090"
    depends_on:
      configserver:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "loans"
    extends:
      service: microservice-configserver-config
      file: common-config.yml

  cards:
    image: ioanteulea/cards:s6
    container_name: cards-ms
    ports:
      - "9000:9000"
    depends_on:
      configserver:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "cards"
    extends:
      service: microservice-configserver-config
      file: common-config.yml

networks:
  bank-network:
    driver: bridge