spring.application.name=cards
server.port=9000

spring.datasource.url=jdbc:h2:mem:cardsdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

build.version="2.0"

cards.message=Welcome to Bank cards related local APIs
cards.contactDetails.name=John Doe - Developer
cards.contactDetails.email=john@bank.com
cards.onCallSupport[0]=(555) 555-1234
cards.onCallSupport[1]=(555) 523-1345