spring.application.name=loans

server.port=8090

spring.datasource.url=jdbc:h2:mem:loansdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


build.version="2.0"

loans.message=Welcome to Bank loans related local APIs
loans.contactDetails.name=John Doe - Developer
loans.contactDetails.email=john@bank.com
loans.onCallSupport[0]=(555) 555-1234
loans.onCallSupport[1]=(555) 523-1345